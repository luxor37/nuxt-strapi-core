name: nuxt-strapi-core CI

on:
  push:
    branches:
      - dev
  pull_request:

concurrency:
  group: nuxt-strapi-core-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install package dependencies
        run: yarn install --frozen-lockfile --non-interactive

      - name: Run unit tests and build checks
        run: yarn test:ci

      - name: Run typecheck
        run: yarn typecheck
