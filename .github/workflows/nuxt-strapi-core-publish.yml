name: nuxt-strapi-core Publish

on:
  push:
    branches:
      - main
    paths:
      - 'packages/nuxt-strapi-core/**'
      - '.github/workflows/nuxt-strapi-core-ci.yml'
      - '.github/workflows/nuxt-strapi-core-publish.yml'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/nuxt-strapi-core

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'
          cache-dependency-path: packages/nuxt-strapi-core/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install package dependencies
        run: yarn install --frozen-lockfile --non-interactive

      - name: Run unit tests and build checks
        run: yarn test:ci

      - name: Read package metadata
        id: package
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether version is already published
        id: published
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with trusted publishing
        if: steps.published.outputs.exists != 'true'
        run: npm publish --provenance --access public

      - name: Skip publish when version already exists
        if: steps.published.outputs.exists == 'true'
        run: echo "Skipping npm publish because ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} already exists."
